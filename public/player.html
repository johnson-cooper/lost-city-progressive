<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player Stats – RuneScape HiScores</title>
 <style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap');

  :root {
    --brown-dark:    #0d0e12;
    --brown-mid:     #1a1c22;
    --brown-light:   #2a2d36;

    /* removed gold completely */
    --accent:        #8fa3c7;
    --accent-light:  #b8c4dd;
    --accent-bright: #d6e0ff;

    --parchment:     #14161b;
    --parchment-mid: #1b1e25;
    --parchment-dark:#262a33;

    --text-dark:     #f1f3f8;
    --text-mid:      #c7cbd6;

    --border:        #3a3f4a;
    --border-dark:   #232733;

    --row-even:      #181a20;
    --row-odd:       #1f222a;

    --header-bg:     #12141a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--brown-dark);
    background-image: radial-gradient(ellipse at 50% 0%, #1a1d26 0%, #090a0f 60%);
    min-height: 100vh;
    font-family: 'IM Fell English', Georgia, serif;
    color: var(--text-dark);
  }

  #page {
    max-width: 760px;
    margin: 0 auto;
    padding: 12px;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 14px 10px 10px;
    border-bottom: 3px solid var(--border);
    margin-bottom: 14px;
  }
  header::before,
  header::after {
    content: '❖';
    color: var(--accent);
  }

  .logo-rune {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 1.8em;
    font-weight: 700;
    color: var(--accent-bright);
    text-shadow: 2px 2px 0 #000, 0 0 12px #8fa3c744;
    letter-spacing: 0.12em;
  }

  .logo-sub {
    font-family: 'Cinzel', serif;
    font-size: 0.72em;
    color: var(--accent-light);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 2px;
    display: block;
  }

  /* ── BACK LINK ── */
  .back-link {
    display: inline-block;
    margin-bottom: 10px;
    color: var(--accent-light);
    font-size: 0.85em;
    text-decoration: none;
    font-family: 'Cinzel', serif;
  }
  .back-link:hover {
    color: var(--accent-bright);
    text-decoration: underline;
  }

  /* ── PLAYER BANNER ── */
  .player-banner {
    background: linear-gradient(180deg, #1f222a 0%, #12141a 100%);
    border: 2px solid var(--border-dark);
    border-bottom: 3px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-radius: 4px 4px 0 0;
  }

  .player-avatar {
    width: 52px;
    height: 52px;
    border: 2px solid var(--border);
    border-radius: 3px;
    background: #0f1116;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .player-name {
    font-family: 'Cinzel', serif;
    font-size: 1.6em;
    font-weight: 700;
    color: var(--accent-bright);
  }

  .player-sub {
    font-size: 0.82em;
    color: var(--accent-light);
    margin-top: 4px;
  }

  .overall-info {
    margin-left: auto;
    text-align: right;
  }

  .overall-info .big-num {
    font-family: 'Cinzel', serif;
    font-size: 1.8em;
    font-weight: 700;
    color: var(--accent-bright);
  }

  .overall-info .label,
  .overall-info .rank-line {
    font-size: 0.75em;
    color: var(--accent-light);
  }

  /* ── SKILLS PANEL ── */
  .skills-panel {
    background: var(--parchment);
    border: 2px solid var(--border-dark);
    border-top: none;
    border-radius: 0 0 4px 4px;
    padding: 14px;
  }

  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 6px;
  }

  .skill-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: var(--row-odd);
    border: 1px solid var(--parchment-dark);
    border-radius: 3px;
    transition: background 0.1s;
  }

  .skill-row:nth-child(even) { background: var(--row-even); }

  .skill-row:hover {
    background: #2a2f3a;
  }

  .skill-name {
    flex: 1;
    font-weight: bold;
    color: var(--text-mid);
    font-size: 0.88em;
  }

  .skill-level {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    color: #9fd18b;
  }

  .skill-xp {
    font-size: 0.72em;
    color: #a8b0c0;
  }

  .skill-rank {
    font-size: 0.7em;
    color: #7f8796;
    font-style: italic;
  }

  /* overall row */
  .skill-row.overall-row {
    background: linear-gradient(90deg, #20242d 0%, #151820 100%);
    border-color: var(--border);
    margin-bottom: 8px;
    grid-column: 1 / -1;
  }

  .skill-row.overall-row .skill-name { color: var(--accent-light); }
  .skill-row.overall-row .skill-level { color: var(--accent-bright); }
  .skill-row.overall-row .skill-xp   { color: var(--accent); }

  /* ── SECTION LABEL ── */
  .section-label {
    font-family: 'Cinzel', serif;
    font-size: 0.72em;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--brown-light);
    border-bottom: 1px solid var(--parchment-dark);
    padding-bottom: 4px;
    margin: 12px 0 8px;
    grid-column: 1 / -1;
  }

  /* ── STATES ── */
  .state-msg {
    text-align: center;
    padding: 30px;
    color: #8a90a0;
    font-style: italic;
  }

  footer {
    text-align: center;
    padding: 12px;
    color: #8fa3c7;
    font-size: 0.72em;
    font-family: 'Cinzel', serif;
    opacity: 0.6;
    margin-top: 10px;
  }

  @media (max-width: 500px) {
    .skills-grid { grid-template-columns: 1fr 1fr; }
    .player-banner { flex-wrap: wrap; }
    .overall-info { margin-left: 0; text-align: left; }
    .player-name { font-size: 1.2em; }
  }
</style>
</head>
<body>
<div id="page">

  <header>
    <div class="logo-rune">2004 SINGLEPLAYER PROGRESSION</div>
    <span class="logo-sub">HiScores</span>
  </header>

  <a href="index.html" class="back-link">◄ Back to HiScores</a>

  <div id="content">
    <div class="state-msg">Loading player…</div>
  </div>

  <footer>ADD DISCORD HERE OR SOMETHING</footer>
</div>

<script src="skills.js"></script>
<script>
const username = new URLSearchParams(window.location.search).get('user') || '';
document.title = username + ' – RuneScape HiScores';

function fmt(n)  { return Number(n).toLocaleString(); }
function esc(s)  { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function load() {
  const res = await fetch('/api/player/' + encodeURIComponent(username));
  if (!res.ok) {
    document.getElementById('content').innerHTML =
      `<div class="state-msg">Player "<b>${esc(username)}</b>" not found on the HiScores.</div>`;
    return;
  }
  const p = await res.json();

  // Build skill lookup from response
  const skillMap = {};
  (p.skills || []).forEach(s => { skillMap[s.type] = s; });

  // Avatar SVG (classic RS silhouette)
  const avatarSvg = `<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="40" height="40" rx="2" fill="#1a0e00"/>
    <circle cx="20" cy="12" r="6" fill="#c8a84b"/>
    <path d="M8 38c0-8 4-14 12-14s12 6 12 14" fill="#8b6914"/>
    <rect x="12" y="20" width="16" height="10" rx="2" fill="#6b3d00"/>
  </svg>`;

  // Overall section
  const overall = p.overall || { level: 0, xp: 0, rank: '–' };

  let html = `
    <div class="player-banner">
      <div class="player-avatar">${avatarSvg}</div>
      <div>
        <div class="player-name">${esc(p.username)}</div>
        <div class="player-sub">RuneScape Player</div>
      </div>
      <div class="overall-info">
        <div class="big-num">${fmt(overall.level)}</div>
        <div class="label">Total Level</div>
        <div class="rank-line">Rank #${fmt(overall.rank)}</div>
      </div>
    </div>
    <div class="skills-panel">
      <div class="skills-grid">
        <div class="skill-row overall-row">
          ${svgIcons.overall}
          <div class="skill-name">Overall</div>
          <div class="skill-stats">
            <div class="skill-level">${fmt(overall.level)}</div>
            <div class="skill-xp">${fmt(overall.xp)} xp</div>
            <div class="skill-rank">Rank #${fmt(overall.rank)}</div>
          </div>
        </div>
        <div class="section-label">Combat Skills</div>
  `;

  const combatSkills = SKILLS.filter(s => s.category === 'combat');
  const gatherSkills = SKILLS.filter(s => s.category === 'gathering');
  const artisanSkills = SKILLS.filter(s => s.category === 'artisan');
  const supportSkills = SKILLS.filter(s => s.category === 'support');

  function renderSkillRows(list) {
    return list.map(s => {
      const data = skillMap[s.id];
      const tracked = !!data;
      return `<div class="skill-row${tracked ? '' : ' untracked'}">
        ${svgIcons[s.key] || ''}
        <div class="skill-name">${s.name}</div>
        <div class="skill-stats">
          <div class="skill-level">${tracked ? fmt(data.level) : '–'}</div>
          <div class="skill-xp">${tracked ? fmt(data.value) + ' xp' : 'No data'}</div>
          ${tracked ? `<div class="skill-rank">Rank #${fmt(data.rank || '–')}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  html += renderSkillRows(combatSkills);
  html += `<div class="section-label">Gathering Skills</div>`;
  html += renderSkillRows(gatherSkills);
  html += `<div class="section-label">Artisan Skills</div>`;
  html += renderSkillRows(artisanSkills);
  html += `<div class="section-label">Support Skills</div>`;
  html += renderSkillRows(supportSkills);
  html += `</div></div>`;

  document.getElementById('content').innerHTML = html;
}

load();
</script>
</body>
</html>
